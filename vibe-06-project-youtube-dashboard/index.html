<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Trend Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- API Key 모달 -->
  <div id="api-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-icon">▶️</div>
      <h2>YouTube Trend Dashboard</h2>
      <p>키워드별 영상 참여율을 분석합니다</p>
      <div class="input-group">
        <label>YouTube Data API Key <span class="required">*</span></label>
        <input type="text" id="yt-key" placeholder="AIza...">
        <a href="https://console.cloud.google.com/" target="_blank" rel="noopener" class="hint-link">Google Cloud Console에서 발급 →</a>
      </div>
      <button id="modal-submit" class="btn-primary">시작하기</button>
    </div>
  </div>

  <!-- 메인 앱 -->
  <div id="app" class="hidden">

    <!-- 헤더 -->
    <header class="app-header">
      <h1>▶️ YouTube Trend Dashboard</h1>
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="키워드 입력 (예: 인공지능, 주식, 먹방)">
        <button id="search-btn" class="btn-primary">검색</button>
      </div>
      <button id="settings-btn" class="btn-icon" title="API Key 변경">⚙️</button>
    </header>

    <!-- 정렬 + 상태 -->
    <div class="toolbar">
      <div id="status-text" class="status-text"></div>
      <div class="sort-wrap">
        <span class="sort-label">정렬:</span>
        <button class="sort-btn active" data-sort="engagement">참여율</button>
        <button class="sort-btn" data-sort="views">조회수</button>
        <button class="sort-btn" data-sort="likes">좋아요</button>
      </div>
    </div>

    <!-- 차트 영역 -->
    <section class="chart-section hidden" id="chart-section">
      <h2 class="section-title">📊 상위 10개 영상 참여율 (%)</h2>
      <div class="chart-wrap">
        <canvas id="engagement-chart"></canvas>
      </div>
    </section>

    <!-- 카드 그리드 -->
    <main class="card-grid" id="card-grid"></main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
