<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Planner — 간조 × 일출/일몰</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- API Key 입력 모달 -->
  <div id="api-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-icon">📸</div>
      <h2>Photo Planner</h2>
      <p>간조 × 일출/일몰이 겹치는 황금 촬영 타이밍을 찾아드립니다</p>
      <div class="input-group">
        <label>Stormglass API Key</label>
        <input type="text" id="api-key-input" placeholder="API Key를 입력하세요">
      </div>
      <button id="api-submit" class="btn-primary">시작하기</button>
      <a href="https://stormglass.io" target="_blank" rel="noopener" class="modal-link">
        API Key 발급받기 →
      </a>
    </div>
  </div>

  <!-- 메인 앱 -->
  <div id="app" class="hidden">

    <!-- 헤더 -->
    <header class="app-header">
      <div class="header-left">
        <h1>📸 Photo Planner</h1>
        <span id="coord-badge" class="coord-badge">지도에서 위치를 클릭하세요</span>
      </div>
      <button id="fetch-btn" class="btn-primary" disabled>데이터 불러오기</button>
    </header>

    <!-- 지도 + 좌표 입력 -->
    <section class="map-section">
      <div id="map"></div>
      <div class="manual-row">
        <input type="number" id="lat-input" placeholder="위도 (예: 34.75)" step="0.001">
        <input type="number" id="lng-input" placeholder="경도 (예: 128.66)" step="0.001">
        <button id="manual-btn" class="btn-secondary">적용</button>
      </div>
    </section>

    <!-- 범례 -->
    <div class="legend">
      <span class="legend-item"><span class="dot sunrise-dot"></span>일출</span>
      <span class="legend-item"><span class="dot sunset-dot"></span>일몰</span>
      <span class="legend-item"><span class="dot tide-dot"></span>간조(썰물)</span>
      <span class="legend-item"><span class="dot golden-dot"></span>황금 찬스 (±1시간 겹침)</span>
    </div>

    <!-- 캘린더 -->
    <section class="calendar-section">
      <div id="calendar-placeholder" class="placeholder">
        위치를 선택한 뒤 <strong>데이터 불러오기</strong>를 눌러주세요
      </div>
      <div id="week-label" class="week-label hidden"></div>
      <div id="calendar-grid" class="calendar-grid hidden"></div>
    </section>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
